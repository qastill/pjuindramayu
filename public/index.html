*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#333}

.si{display:flex;align-items:center;gap:9px;padding:9px 16px;color:#aaa;cursor:pointer;font-size:12px;border-left:3px solid transparent;transition:all .15s}
.si:hover{background:rgba(255,255,255,.05);color:#fff}.si.active{background:rgba(243,156,18,.12);color:var(--s);border-left-color:var(--s)}
.ic{width:16px;text-align:center;font-size:13px}

// Helper: save to Supabase (non-blocking, falls back to local)
async function sbInsert(table, data) {
  if (!sb || SUPABASE_URL === 'PLACEHOLDER_URL') return null;
  try {
    const { data: result, error } = await sb.from(table).insert(data).select().single();
    if (error) { console.error('SB insert:', error.message); return null; }
    return result;
  } catch(e) { return null; }
}
async function sbUploadPhoto(file, folder) {
  if (!sb || SUPABASE_URL === 'PLACEHOLDER_URL') return null;
  try {
    var ext = file.name.split('.').pop();
    var path = folder + '/' + Date.now() + '.' + ext;
    var { error } = await sb.storage.from('photos').upload(path, file);
    if (error) return null;
    var { data } = sb.storage.from('photos').getPublicUrl(path);
    return data.publicUrl;
  } catch(e) { return null; }
}

<script>
var IMG_PJU='img_pju.jpg',IMG_MTR='img_meter.jpg';
var isAdmin=false,currentPage='public';

// Stats
var S={tp:0,ak:0,mt:0,td:0,tk:0,te:0,an:0,ul:{},theft:0,totalTag:0};
METER_DATA.forEach(function(m){
  S.tp+=m.jmlPJU;S.td+=m.totalDaya;S.tk+=m.kwhPerDay;S.te+=m.kwhEst;
  if(m.status==='anomali')S.an++;if(m.tagihanBln===0)S.theft++;
  m.pjuList.forEach(function(p){if(p[5]===1)S.ak++;else S.mt++});
  S.ul[m.ulp]=(S.ul[m.ulp]||0)+m.jmlPJU;S.totalTag+=m.tagihanBln;
});S.tk=Math.round(S.tk);S.te=Math.round(S.te);

// ===== SHARED: MAP =====
var map,mL,cL,zL,cV=true,zV=false;
function initMap(){
  var el=document.getElementById('map-container');if(!el)return;
  map=L.map(el).setView([-6.42,108.28],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  mL=L.layerGroup().addTo(map);cL=L.layerGroup().addTo(map);
  zL=L.layerGroup();
  if(typeof DARK_ZONES!=='undefined')DARK_ZONES.forEach(function(z){
    var c=z.prioritas==='tinggi'?'#dc2626':z.prioritas==='sedang'?'#ea580c':'#64748b';
    L.circle([z.lat,z.lng],{radius:z.radius,color:c,fillColor:c,fillOpacity:.12,weight:2,dashArray:'8,6'}).bindPopup('<div style="font-family:Segoe UI;min-width:180px"><div style="background:'+c+';color:#fff;padding:7px 10px;margin:-10px -12px 7px;border-radius:4px 4px 0 0;font-weight:700;font-size:11px">🌑 '+z.id+'</div><b>'+z.nama+'</b><br><span style="font-size:10px;color:#666">Kec.'+z.kec+' | '+z.warga.toLocaleString('id-ID')+' warga | Est.'+z.est_titik+' PJU</span><br><span style="font-size:10px">'+z.alasan+'</span></div>').addTo(zL);
  });
  rM('all');
}
function rM(f){
  if(!mL)return;mL.clearLayers();cL.clearLayers();
  METER_DATA.forEach(function(m,mi){
    var isA=m.status==='anomali',isTh=m.tagihanBln===0;
    var col=isTh?'#991b1b':isA?'#dc2626':'#27ae60'; // GREEN=legal, RED=ilegal
    var sz=isTh?32:isA?28:22;
    var sM=f==='all'||f==='meter'||(f==='ilegal'&&(isA||isTh));
    if(sM){
      var ic=L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+(sz>26?18:14)+'px;'+(isTh?'outline:2px solid #dc262666;outline-offset:2px':'')+'"><i class="fas fa-bolt"></i></div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2]});
      var mk=L.marker([m.lat,m.lng],{icon:ic,zIndexOffset:1000});
      var stH=isTh?'<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:5px;padding:6px;font-size:10px;color:#991b1b;margin:5px 0"><b>🔴 INDIKASI PENCURIAN</b><br>Tagihan Rp 0 — bypass meter</div>':isA?'<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:5px;padding:5px;font-size:10px;color:#991b1b;margin:5px 0"><b>⚠️ ANOMALI +'+m.anomaliPct+'%</b></div>':'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;padding:4px 6px;font-size:10px;color:#166534;margin:5px 0">✅ Normal</div>';
      mk.bindPopup('<div style="font-family:Segoe UI;min-width:250px"><div style="background:'+col+';color:#fff;padding:8px 11px;margin:-8px -10px 8px;border-radius:4px 4px 0 0"><b style="font-size:12px">⚡ '+m.id+'</b><div style="font-size:9px;opacity:.8">'+m.gardu+' | PLN:'+(m.pln||'—')+'</div></div><img src="'+IMG_MTR+'" style="width:100%;height:80px;object-fit:cover;border-radius:5px;margin-bottom:6px;cursor:pointer" onclick="openPV(\''+IMG_MTR+'\',\'Meter '+m.id+'\')"><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px"><div style="background:#f8fafc;padding:5px;border-radius:4px;text-align:center;border:1px solid #eee"><div style="font-size:15px;font-weight:800;color:#1a3c5e">'+m.jmlPJU+'</div><div style="font-size:8px;color:#888">Jumlah PJU</div></div><div style="background:#f8fafc;padding:5px;border-radius:4px;text-align:center;border:1px solid #eee"><div style="font-size:15px;font-weight:800;color:#1a3c5e">'+(m.totalDaya/1000).toFixed(1)+'kW</div><div style="font-size:8px;color:#888">Total Daya</div></div><div style="background:#f8fafc;padding:5px;border-radius:4px;text-align:center;border:1px solid #eee"><div style="font-size:13px;font-weight:800;color:#3498db">'+m.kwhPerDay+'</div><div style="font-size:8px;color:#888">kWh/Hari</div></div><div style="background:#f8fafc;padding:5px;border-radius:4px;text-align:center;border:1px solid #eee"><div style="font-size:12px;font-weight:800;color:'+(isTh?'#dc2626':'#e67e22')+'">Rp'+(m.tagihanBln>0?(m.tagihanBln/1e6).toFixed(1)+'Jt':'0⚠️')+'</div><div style="font-size:8px;color:#888">Tagihan/Bln</div></div></div>'+stH+'</div>',{maxWidth:280});
      mL.addLayer(mk);
    }
    m.pjuList.forEach(function(p,pi){
      var sP=f==='all'||(f==='aktif'&&p[5]===1)||(f==='mati'&&p[5]!==1)||(f==='ilegal'&&(isA||isTh))||f==='meter';
      if(cV&&(sP||sM))cL.addLayer(L.polyline([[m.lat,m.lng],[p[1],p[2]]],{color:isTh?'#dc2626':isA?'#e74c3c':'#3498db',weight:3,opacity:.5,dashArray:'6,8'}));
      if(sP){
        var pc=p[5]===1?'#16a34a':'#dc2626';
        var pi2=L.divIcon({className:'',html:'<div style="width:14px;height:14px;background:'+pc+';border-radius:50%;border:2.5px solid rgba(255,255,255,.95);box-shadow:0 1px 4px rgba(0,0,0,.3)"></div>',iconSize:[14,14],iconAnchor:[7,7],popupAnchor:[0,-7]});
        var pm=L.marker([p[1],p[2]],{icon:pi2});
        pm.bindPopup('<div style="font-family:Segoe UI;min-width:200px"><div style="background:'+pc+';color:#fff;padding:6px 9px;margin:-8px -10px 6px;border-radius:4px 4px 0 0;font-weight:700;font-size:11px">💡 '+p[0]+'</div><img src="'+IMG_PJU+'" style="width:100%;height:70px;object-fit:cover;border-radius:5px;margin-bottom:5px;cursor:pointer" onclick="openPV(\''+IMG_PJU+'\',\'PJU '+p[0]+'\')"><div style="font-size:11px;line-height:1.6">🔌 Induk: <b>'+m.id+'</b><br>💡 <b>'+({LED:'LED',Sod:'Sodium HPS',Sol:'Solar Panel',Mer:'Mercury'}[p[4]]||p[4])+'</b> | ⚡ <b>'+p[3]+'W</b><br>🚦 <b style="color:'+pc+'">'+(p[5]===1?'AKTIF':'MATI')+'</b></div></div>',{maxWidth:220});
        mL.addLayer(pm);
      }
    });
  });
}
window.fM=function(f){rM(f)};window.tC=function(){cV=!cV;rM('all')};
window.tZ=function(){zV=!zV;if(zV)zL.addTo(map);else map.removeLayer(zL)};

}
function initGarduSel(){var s=document.getElementById('tp-gardu');if(!s)return;METER_DATA.forEach(function(m){var o=document.createElement('option');o.value=m.gardu;o.textContent=m.gardu+' ('+m.jmlPJU+') '+m.ulp+(m.status==='anomali'?' ⚠️':'');s.appendChild(o)})}
window.sGI=function(v){var b=document.getElementById('tp-info');if(!v){b.className='mib';return}var m=METER_DATA.find(function(x){return x.gardu===v});if(!m){b.className='mib';return}b.className='mib show';b.innerHTML='<b>⚡'+m.id+'</b> '+m.ulp+(m.tagihanBln===0?' <span style="color:#991b1b">🔴PENCURIAN</span>':m.status==='anomali'?' <span style="color:#dc2626">⚠️</span>':'')+'<br>'+m.jmlPJU+' PJU | '+(m.totalDaya/1e3).toFixed(1)+'kW | Rp'+(m.tagihanBln/1e6).toFixed(1)+'Jt/bln'};
var isLeg=true;window.setL=function(v){isLeg=!!v;document.getElementById('ro-l').className='ro'[0]==='r'?'':'';var a=document.getElementById('ro-l'),b=document.getElementById('ro-i');a.className=v?'sl':'';b.className=v?'':'si'};
function initTables(){
  var pb=document.getElementById('tPB'),c=0;if(!pb)return;
  METER_DATA.forEach(function(m){m.pjuList.forEach(function(p){if(c>=250)return;c++;pb.innerHTML+='<tr><td><code style="font-size:9px">'+p[0]+'</code></td><td>'+m.gardu+'</td><td style="font-size:9px">'+m.ulp+'</td><td>'+p[3]+'W</td><td>'+({LED:'LED',Sod:'Sodium HPS',Sol:'Solar Panel',Mer:'Mercury'}[p[4]]||p[4])+'</td><td><span class="sb '+(p[5]===1?'sb-g':'sb-r')+'">'+(p[5]===1?'✅':'🔴')+'</span></td></tr>'})});
  document.getElementById('tPI').textContent=c+'/'+S.tp;
  var mb=document.getElementById('tMB');if(!mb)return;
  METER_DATA.slice(0,100).forEach(function(m){var isTh=m.tagihanBln===0;mb.innerHTML+='<tr'+(isTh?' style="background:#fef2f2"':m.status==='anomali'?' style="background:#faf5ff"':'')+'><td><code style="font-size:9px">'+m.id+'</code></td><td>'+m.gardu+'</td><td style="font-size:9px">'+m.ulp+'</td><td><b>'+m.jmlPJU+'</b></td><td>'+(m.totalDaya/1e3).toFixed(1)+'kW</td><td'+(isTh?' style="color:#dc2626;font-weight:700"':'')+'>Rp'+(m.tagihanBln>0?(m.tagihanBln/1e6).toFixed(1)+'Jt':'0⚠️')+'</td><td><span class="sb '+(isTh?'sb-r':m.status==='anomali'?'sb-p':'sb-g')+'">'+(isTh?'🔴Rp0':m.status==='anomali'?'⚠️+'+m.anomaliPct+'%':'✅')+'</span></td></tr>'});
}
function initIlegal(){
  var a=METER_DATA.filter(function(m){return m.status==='anomali'||m.tagihanBln===0}).sort(function(a,b){return(b.tagihanBln===0?200:b.anomaliPct)-(a.tagihanBln===0?200:a.anomaliPct)});
  var th=a.filter(function(m){return m.tagihanBln===0});
  var el=document.getElementById('iS');if(!el)return;
  el.innerHTML='<div class="sc"><div class="si2" style="background:rgba(155,89,182,.1);color:#9b59b6">⚠️</div><div><div class="n" style="color:#9b59b6">'+a.length+'</div><div class="l">Total</div></div></div><div class="sc"><div class="si2" style="background:rgba(231,76,60,.15);color:#991b1b">🔴</div><div><div class="n" style="color:#991b1b">'+th.length+'</div><div class="l">Rp0 (Pencurian)</div></div></div><div class="sc"><div class="si2" style="background:rgba(231,76,60,.1);color:var(--d)">📊</div><div><div class="n" style="color:var(--d)">'+(a.length-th.length)+'</div><div class="l">Anomali kWh</div></div></div>';
  var il=document.getElementById('iL');if(!il)return;
  a.slice(0,30).forEach(function(m){var isTh=m.tagihanBln===0;il.innerHTML+='<div style="border-left:3px solid '+(isTh?'#991b1b':'#ea580c')+';background:'+(isTh?'#fef2f2':'#fffbeb')+';padding:10px;border-radius:0 6px 6px 0;margin-bottom:6px;font-size:11px"><div style="display:flex;justify-content:space-between"><b>'+m.id+' — '+m.gardu+'</b><span style="background:rgba(0,0,0,.04);color:'+(isTh?'#991b1b':'#ea580c')+';padding:2px 7px;border-radius:8px;font-size:9px;font-weight:700">'+(isTh?'🔴Rp0':'⚠️+'+m.anomaliPct+'%')+'</span></div><div style="color:#666">'+m.ulp+' | '+m.jmlPJU+' PJU | '+(m.totalDaya/1e3).toFixed(1)+'kW</div>'+(isTh?'<div style="color:#991b1b;font-weight:700">PENCURIAN: Meter aktif, tagihan Rp0</div>':'<div>Est:'+m.kwhEst+' → Aktual:<b style="color:#ea580c">'+m.kwhPerDay+'</b> kWh</div>')+'</div>'});
}
window.fT=function(v){document.querySelectorAll('#tPB tr').forEach(function(r){r.style.display=r.textContent.toLowerCase().indexOf(v.toLowerCase())>-1?'':'none'})};

// ===== UPLOAD & GPS =====
window.pU=function(i,z){var f=i.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){var el=document.getElementById(z);el.classList.add('hp');el.innerHTML='<img src="'+e.target.result+'"><div style="font-size:9px;color:#27ae60;margin-top:2px">✅ OK</div><input type="file" accept="image/*" capture="environment" onchange="pU(this,\''+z+'\')">'};r.readAsDataURL(f)};
window.gG=function(a,b,btn){if(!navigator.geolocation){alert('GPS tidak tersedia');return}btn.innerHTML='📡 Mengambil...';btn.disabled=true;navigator.geolocation.getCurrentPosition(function(p){document.getElementById(a).value=p.coords.latitude.toFixed(6);document.getElementById(b).value=p.coords.longitude.toFixed(6);btn.innerHTML='✅ OK!';btn.style.background='#27ae60';var lat=p.coords.latitude,lng=p.coords.longitude,best=null,bd=Infinity;METER_DATA.forEach(function(m){var d=Math.sqrt(Math.pow(m.lat-lat,2)+Math.pow(m.lng-lng,2));if(d<bd){bd=d;best=m}});if(best&&document.getElementById('tp-gardu')){document.getElementById('tp-gardu').value=best.gardu;sGI(best.gardu)}setTimeout(function(){btn.innerHTML='📱 Ambil GPS Otomatis';btn.style.background='';btn.disabled=false},2500)},function(){btn.innerHTML='❌ Gagal';btn.disabled=false;setTimeout(function(){btn.innerHTML='📱 Ambil GPS Otomatis'},2e3)},{enableHighAccuracy:true,timeout:15000})};
window.sPJU=function(){var la=document.getElementById('tp-lat').value,lo=document.getElementById('tp-lng').value,g=document.getElementById('tp-gardu').value;if(!la||!lo){alert('GPS wajib!');return}if(!g){alert('Pilih Meter!');return}var h=document.getElementById('th');if(h.textContent.indexOf('Belum')>-1)h.innerHTML='';var c=document.createElement('div');c.style.cssText='background:'+(isLeg?'#f0fff4':'#fef2f2')+';border:1.5px solid '+(isLeg?'#86efac':'#fca5a5')+';border-radius:6px;padding:8px;margin-bottom:5px;font-size:10px';c.innerHTML='<b style="color:'+(isLeg?'#166534':'#991b1b')+'">'+(isLeg?'✅Legal':'🔴ILEGAL')+' → '+g+'</b><br>📍'+la+','+lo+' | '+new Date().toLocaleTimeString('id-ID');h.prepend(c);sbInsert('pju_points',{gardu:g,lat:parseFloat(la),lng:parseFloat(lo),jenis_lampu:(document.getElementById('tp-j')||{}).value||'LED',daya:parseInt((document.getElementById('tp-d')||{}).value)||900,status:'aktif',is_legal:isLeg});showM('PJU di-tag ke '+g+(isLeg?'':' (ILEGAL)')+'. Tersimpan ke database.');['tp-lat','tp-lng','tp-d'].forEach(function(x){document.getElementById(x).value=''});document.getElementById('tp-gardu').value='';document.getElementById('tp-info').className='mib';var uz=document.getElementById('uz-pju');uz.classList.remove('hp');uz.innerHTML='<div style="font-size:28px">📷</div><div style="color:#888;font-size:11px">Buka kamera HP</div><input type="file" accept="image/*" capture="environment" onchange="pU(this,\'uz-pju\')">'};
window.sMTR=function(){var la=document.getElementById('tm-lat').value,lo=document.getElementById('tm-lng').value,g=document.getElementById('tm-g').value;if(!la||!lo){alert('GPS wajib!');return}if(!g){alert('ID Gardu wajib!');return}var h=document.getElementById('mh');if(h.textContent.indexOf('Belum')>-1)h.innerHTML='';var c=document.createElement('div');c.style.cssText='background:#fffbeb;border:1.5px solid #fde68a;border-radius:6px;padding:8px;margin-bottom:5px;font-size:10px';c.innerHTML='<b style="color:#92400e">⚡'+g+' Tersimpan</b><br>📍'+la+','+lo;h.prepend(c);sbInsert('kwh_meters',{gardu:g,no_pln:(document.getElementById('tm-p')||{}).value||'',ulp:(document.getElementById('tm-u')||{}).value||'',lat:parseFloat(la),lng:parseFloat(lo),status:'normal'});showM('Meter '+g+' tersimpan ke database!');['tm-lat','tm-lng','tm-g','tm-p'].forEach(function(x){document.getElementById(x).value=''});var uz=document.getElementById('uz-meter');uz.classList.remove('hp');uz.innerHTML='<div style="font-size:28px">⚡</div><div style="color:#888;font-size:11px">Foto KWH Meter</div><input type="file" accept="image/*" capture="environment" onchange="pU(this,\'uz-meter\')">'};

// ===== PUBLIC SUBMIT (Supabase) =====
window.submitPengaduan=function(){var l=document.getElementById('pa-lok').value;if(!l){alert('Isi lokasi!');return}sbInsert('pengaduan',{lokasi:l,jenis_masalah:(document.getElementById('pa-jenis')||{}).value||'Lampu mati',keterangan:(document.getElementById('pa-ket')||{}).value||'',nama_pelapor:(document.getElementById('pa-nama')||{}).value||'Anonim',no_hp:(document.getElementById('pa-hp')||{}).value||''}).then(function(r){showM('Pengaduan terkirim!'+(r&&r.nomor_tiket?' Tiket: '+r.nomor_tiket:''))});document.getElementById('pa-lok').value='';document.getElementById('pa-ket').value='';};
window.submitPermohonan=function(){var l=document.getElementById('pm-lok').value;if(!l){alert('Isi lokasi!');return}sbInsert('permohonan',{lokasi:l,kecamatan:(document.getElementById('pm-kec')||{}).value||'',alasan:(document.getElementById('pm-alasan')||{}).value||'',nama_pemohon:(document.getElementById('pm-nama')||{}).value||'Anonim',no_hp:(document.getElementById('pm-hp')||{}).value||''}).then(function(r){showM('Permohonan terkirim!'+(r&&r.nomor_permohonan?' No: '+r.nomor_permohonan:''))});document.getElementById('pm-lok').value='';document.getElementById('pm-alasan').value='';};
window.submitIlegal=function(){var l=document.getElementById('pi-lok').value;if(!l){alert('Isi lokasi!');return}sbInsert('laporan_ilegal',{lokasi:l,keterangan:(document.getElementById('pi-ket')||{}).value||'',nama_pelapor:(document.getElementById('pi-nama')||{}).value||'Anonim'}).then(function(r){showM('Laporan terkirim!'+(r&&r.nomor_laporan?' No: '+r.nomor_laporan:''))});document.getElementById('pi-lok').value='';document.getElementById('pi-ket').value='';};
// ===== LOGIN =====
window.showLogin=function(){var m=document.getElementById('modal');m.innerHTML='<div class="modal"><div style="font-size:36px;margin-bottom:6px">🔐</div><div style="font-size:14px;font-weight:700;color:var(--p);margin-bottom:12px">Login Admin PLN / Dishub</div><div class="fg"><label>Username</label><input class="fc" id="lu" placeholder="admin"></div><div class="fg"><label>Password</label><input class="fc" id="lp" type="password" placeholder="sipju2025"></div><div style="font-size:10px;color:#888;margin-bottom:10px">Demo: admin / sipju2025</div><button class="btn btn-primary" style="width:100%;padding:10px" onclick="doLogin()">Masuk</button><div style="margin-top:8px;font-size:10px;color:#888;cursor:pointer" onclick="document.getElementById(\'modal\').style.display=\'none\'">Tutup</div></div>';m.style.display='flex'};
window.doLogin=function(){var u=(document.getElementById('lu')||{}).value,p=(document.getElementById('lp')||{}).value;if(u==='admin'&&p==='sipju2025'){document.getElementById('modal').style.display='none';renderAdmin()}else{alert('Username/password salah!')}};

// ===== NAV =====
window.sp=function(id){document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('active')});document.querySelectorAll('.si').forEach(function(s){s.classList.remove('active')});var pg=document.getElementById('pg-'+id);if(pg)pg.classList.add('active');document.querySelectorAll('.si').forEach(function(s){if(s.getAttribute('onclick')&&s.getAttribute('onclick').indexOf("'"+id+"'")>-1)s.classList.add('active')});if((id==='petapublik'||id==='petaadmin')&&map)setTimeout(function(){map.invalidateSize()},150);if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open')};

// ===== UTILS =====
function showM(m){var el=document.getElementById('modal');el.innerHTML='<div class="modal"><div style="font-size:40px;margin-bottom:8px">✅</div><p style="font-size:12px;color:#555">'+m+'</p><button class="btn btn-primary" style="margin-top:10px" onclick="document.getElementById(\'modal\').style.display=\'none\'">OK</button></div>';el.style.display='flex'}
function updateClock(){var d=new Date(),e=document.getElementById('clock');if(e)e.textContent=d.toLocaleString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
setInterval(updateClock,1000);updateClock();

// ===== INIT =====
setTimeout(function(){document.getElementById('ld').remove()},400);
renderPublic();initMap();
</script>

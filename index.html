<script>
document.addEventListener('DOMContentLoaded',function(){
// Remove loading
setTimeout(function(){var ld=document.getElementById('app-loading');if(ld)ld.remove()},500);

// ===== STATS =====
var S={totalPJU:0,aktif:0,mati:0,totalDaya:0,totalKwh:0,totalKwhEst:0,anomali:0,ulp:{}};
METER_DATA.forEach(function(m){
  S.totalPJU+=m.jmlPJU;S.totalDaya+=m.totalDaya;S.totalKwh+=m.kwhPerDay;S.totalKwhEst+=m.kwhEst;
  if(m.status==='anomali')S.anomali++;
  m.pjuList.forEach(function(p){if(p.status==='aktif')S.aktif++;else S.mati++});
  S.ulp[m.ulp]=(S.ulp[m.ulp]||0)+m.jmlPJU;
});
S.totalKwh=Math.round(S.totalKwh);S.totalKwhEst=Math.round(S.totalKwhEst);

// ===== BUILD HTML =====
document.body.insertAdjacentHTML('afterbegin', buildApp(S));

// ===== INIT =====
initDash(S);initCharts(S);initMap();initGarduSel();initTables(S);initIlegal();
updateClock();setInterval(updateClock,1000);
});

        '<div class="bi"><div class="bv">Rp 1.497</div><div class="bl">Tarif PLN/kWh</div></div>'+

      '</div>'+
    '</div>'+
    '<div class="sg" id="dash-stats"></div>'+
    '<div class="g2"><div class="card"><div class="ch"><h3><i class="fas fa-chart-bar"></i> PJU per ULP</h3></div><div class="cb"><div class="cc"><canvas id="chartULP"></canvas></div></div></div>'+

  '</div>'+
  // DATA PJU

    '<div class="card"><div class="ch"><h3>Daftar PJU</h3></div><div class="cb"><input class="fc" placeholder="🔍 Cari..." oninput="fT(this.value)" style="margin-bottom:10px;max-width:350px"><div class="tw"><table id="tPJU"><thead><tr><th>ID</th><th>Gardu</th><th>ULP</th><th>Daya</th><th>Jenis</th><th>Tiang</th><th>Koordinat</th><th>Status</th></tr></thead><tbody id="tPB"></tbody></table></div><div style="margin-top:8px;font-size:11px;color:#888" id="tPI"></div></div></div></div>'+

function getCSS(){

  '*{margin:0;padding:0;box-sizing:border-box}body{font-family:Segoe UI,sans-serif;background:#f0f4f8;color:#333}'+
  '.topbar{background:linear-gradient(135deg,var(--p),#2c5f8a);color:#fff;padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:fixed;top:0;left:0;right:0;z-index:1000;box-shadow:0 2px 10px rgba(0,0,0,.3)}'+
  '.topbar .logo{display:flex;align-items:center;gap:10px}.icon-lamp{width:36px;height:36px;background:var(--s);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px}'+

  '.sidebar-menu{padding:10px 0}'+

  'table td{padding:8px 10px;border-bottom:1px solid #eee}table tr:hover{background:#f8f9fa}'+
  '.sb{padding:3px 7px;border-radius:12px;font-size:9px;font-weight:600;display:inline-block}'+
  '.sb-g{background:rgba(39,174,96,.1);color:var(--a)}.sb-r{background:rgba(231,76,60,.1);color:var(--d)}.sb-p{background:rgba(155,89,182,.1);color:#9b59b6}'+
  '.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:2000;align-items:center;justify-content:center}'+
  '.modal{background:#fff;border-radius:12px;padding:24px;text-align:center;max-width:380px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,.2)}'+
  '@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:12px}.g2{grid-template-columns:1fr}.sg{grid-template-columns:repeat(2,1fr)}.hamburger{display:block}.billing .ba{font-size:22px}}'+
  '::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px}';
}

// ===== NAV =====
function sp(id){
  document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('active')});
  document.querySelectorAll('.si').forEach(function(s){s.classList.remove('active')});
  var pg=document.getElementById('pg-'+id);if(pg)pg.classList.add('active');
  document.querySelectorAll('.si').forEach(function(s){if(s.getAttribute('onclick')&&s.getAttribute('onclick').indexOf("'"+id+"'")>-1)s.classList.add('active')});
  if(id==='peta'&&map)setTimeout(function(){map.invalidateSize()},100);
  if(window.innerWidth<=768)document.getElementById('sidebar').classList.remove('open');
}
window.sp=sp;

// ===== DASHBOARD STATS =====
function initDash(S){
  document.getElementById('dash-stats').innerHTML=
    sc('📊',S.totalPJU,'Total PJU','--i','datapju')+sc('✅',S.aktif,'PJU Aktif','--a')+sc('❌',S.mati,'PJU Mati','--d')+
    sc('⚡',METER_DATA.length,'KWH Meter','#9b59b6','datameter')+sc('⚠️',S.anomali,'Indikasi Ilegal','#9b59b6','ilegal');
  function sc(i,n,l,c,pg){
    return '<div class="sc"'+(pg?' onclick="sp(\''+pg+'\')"':'')+'><div class="si2" style="background:rgba('+hexToRgb(c)+',.1);color:'+c+'">'+i+'</div><div><div class="n" style="color:'+c+'">'+n.toLocaleString('id-ID')+'</div><div class="l">'+l+'</div></div></div>';
  }
}
function hexToRgb(c){if(c.startsWith('--')){var m={'--i':'52,152,219','--a':'39,174,96','--d':'231,76,60'};return m[c]||'100,100,100'}if(c==='#9b59b6')return '155,89,182';return '100,100,100'}

// ===== CHARTS =====
function initCharts(S){
  var ul=Object.keys(S.ulp),ud=Object.values(S.ulp);
  new Chart(document.getElementById('chartULP'),{type:'bar',data:{labels:ul,datasets:[{label:'PJU',data:ud,backgroundColor:['#3498db','#27ae60','#e67e22','#9b59b6'],borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  new Chart(document.getElementById('chartStatus'),{type:'doughnut',data:{labels:['Aktif','Mati'],datasets:[{data:[S.aktif,S.mati],backgroundColor:['#27ae60','#e74c3c'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom'}}}});
  new Chart(document.getElementById('chartTrend'),{type:'line',data:{labels:['Jan','Feb','Mar','Apr','Mei','Jun'],datasets:[{label:'kWh(rb)',data:[720,695,738,710,745,760],borderColor:'#3498db',fill:true,backgroundColor:'rgba(52,152,219,.08)',tension:.4,yAxisID:'y'},{label:'Tagihan(Jt)',data:[465,450,478,460,483,492],borderColor:'#e74c3c',fill:true,backgroundColor:'rgba(231,76,60,.08)',tension:.4,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{position:'left'},y1:{position:'right',grid:{drawOnChartArea:false}}}}});
}

// ===== MAP =====
var map,mL,cL,cV=true,cF='all';
function initMap(){
  map=L.map('map-container').setView([-6.42,108.28],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  mL=L.layerGroup().addTo(map);cL=L.layerGroup().addTo(map);rM('all');
}
function rM(f){
  mL.clearLayers();cL.clearLayers();
  METER_DATA.forEach(function(m){
    var isA=m.status==='anomali',col=isA?'#dc2626':'#e67e22',sz=isA?30:24;
    var sM=f==='all'||f==='meter'||(f==='ilegal'&&isA);
    if(sM){
      var ic=L.divIcon({className:'',html:'<div style="width:'+sz+'px;height:'+sz+'px;background:'+col+';border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:'+(sz>26?13:11)+'px;color:#fff">⚡</div>',iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2]});
      var mk=L.marker([m.lat,m.lng],{icon:ic,zIndexOffset:1000});
      var ah=isA?'<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:5px;padding:6px;font-size:10px;color:#991b1b;margin:5px 0"><b>🔴 ANOMALI +'+m.anomaliPct+'%</b><br>Est:'+m.kwhEst+' | Aktual:'+m.kwhPerDay+' kWh</div>':'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:5px;padding:4px 6px;font-size:10px;color:#166534;margin:5px 0">✅ Normal</div>';
      mk.bindPopup('<div style="font-family:Segoe UI,sans-serif;min-width:240px"><div style="background:'+col+';color:#fff;padding:8px 11px;margin:-14px -20px 8px;border-radius:4px 4px 0 0"><b style="font-size:12px">⚡ '+m.id+'</b><div style="font-size:9px;opacity:.8">Gardu:'+m.gardu+' | PLN:'+m.pln+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px"><div style="background:#f8fafc;padding:6px;border-radius:5px;text-align:center;border:1px solid #eee"><div style="font-size:15px;font-weight:800;color:#1a3c5e">'+m.jmlPJU+'</div><div style="font-size:8px;color:#888">Jumlah PJU</div></div><div style="background:#f8fafc;padding:6px;border-radius:5px;text-align:center;border:1px solid #eee"><div style="font-size:15px;font-weight:800;color:#1a3c5e">'+(m.totalDaya/1000).toFixed(1)+'kW</div><div style="font-size:8px;color:#888">Total Daya</div></div><div style="background:#f8fafc;padding:6px;border-radius:5px;text-align:center;border:1px solid #eee"><div style="font-size:15px;font-weight:800;color:#3498db">'+m.kwhPerDay+'</div><div style="font-size:8px;color:#888">kWh/Hari</div></div><div style="background:#f8fafc;padding:6px;border-radius:5px;text-align:center;border:1px solid #eee"><div style="font-size:13px;font-weight:800;color:#e67e22">Rp'+(m.tagihanBln/1e6).toFixed(1)+'Jt</div><div style="font-size:8px;color:#888">Tagihan/Bln</div></div></div>'+ah+'<div style="font-size:9px;color:#888">'+m.ulp+' | '+m.lat.toFixed(4)+','+m.lng.toFixed(4)+'</div></div>',{maxWidth:280});
      mL.addLayer(mk);
    }
    m.pjuList.forEach(function(p){
      var sP=f==='all'||(f==='aktif'&&p.status==='aktif')||(f==='mati'&&p.status==='mati')||(f==='ilegal'&&isA)||f==='meter';
      if(cV&&(sP||sM)){cL.addLayer(L.polyline([[m.lat,m.lng],[p.lat,p.lng]],{color:isA?'#e74c3c':'#3498db',weight:2,opacity:.4,dashArray:'5,8'}))}
      if(sP){
        var pc=p.status==='aktif'?'#16a34a':'#dc2626';
        var pi=L.divIcon({className:'',html:'<div style="width:9px;height:9px;background:'+pc+';border-radius:50%;border:2px solid rgba(255,255,255,.9);box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>',iconSize:[9,9],iconAnchor:[4,4],popupAnchor:[0,-4]});
        var pm=L.marker([p.lat,p.lng],{icon:pi});
        pm.bindPopup('<div style="font-family:Segoe UI,sans-serif;min-width:160px"><div style="background:'+pc+';color:#fff;padding:6px 9px;margin:-14px -20px 6px;border-radius:4px 4px 0 0;font-weight:700;font-size:11px">💡 '+p.id+'</div><div style="font-size:10px">🔌 '+m.id+'<br>💡 '+p.jenis+' '+p.daya+'W<br>🚦 '+p.status.toUpperCase()+'</div></div>',{maxWidth:200});
        mL.addLayer(pm);
      }
    });
  });
}
function fM(f){cF=f;rM(f)}window.fM=fM;
function tC(){cV=!cV;rM(cF)}window.tC=tC;

// ===== GARDU SELECT =====
function initGarduSel(){
  var s=document.getElementById('tp-gardu');if(!s)return;
  METER_DATA.forEach(function(m){var o=document.createElement('option');o.value=m.gardu;o.textContent=m.gardu+' ('+m.jmlPJU+' PJU)'+(m.status==='anomali'?' ⚠️':'');s.appendChild(o)});
}
function sGI(v){
  var b=document.getElementById('tp-info');if(!v){b.className='mib';return}
  var m=METER_DATA.find(function(x){return x.gardu===v});if(!m){b.className='mib';return}
  b.className='mib show';
  b.innerHTML='<b>⚡ '+m.id+'</b> — '+m.ulp+(m.status==='anomali'?' <span style="color:#dc2626">⚠️</span>':'')+'<br>'+m.jmlPJU+' PJU | '+(m.totalDaya/1000).toFixed(1)+'kW | '+m.kwhPerDay+' kWh/hari';
}
window.sGI=sGI;

// ===== UPLOAD =====
function pU(i,z){var f=i.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){var el=document.getElementById(z);el.classList.add('hp');el.innerHTML='<img src="'+e.target.result+'"><input type="file" accept="image/*" capture="environment" onchange="pU(this,\''+z+'\')">'};r.readAsDataURL(f)}
window.pU=pU;
function gG(a,b,btn){if(!navigator.geolocation){alert('GPS tidak tersedia');return}btn.textContent='📡...';btn.disabled=true;navigator.geolocation.getCurrentPosition(function(p){document.getElementById(a).value=p.coords.latitude.toFixed(6);document.getElementById(b).value=p.coords.longitude.toFixed(6);btn.textContent='✅';setTimeout(function(){btn.textContent='📱 Ambil GPS';btn.disabled=false},2e3)},function(){btn.textContent='❌';btn.disabled=false;setTimeout(function(){btn.textContent='📱 Ambil GPS'},2e3)},{enableHighAccuracy:true,timeout:1e4})}
window.gG=gG;

function sPJU(){
  var la=document.getElementById('tp-lat').value,lo=document.getElementById('tp-lng').value,g=document.getElementById('tp-gardu').value;
  if(!la||!lo){alert('GPS wajib!');return}if(!g){alert('Pilih Gardu!');return}
  var h=document.getElementById('th');if(h.querySelector('div[style]')&&h.textContent.indexOf('Belum')>-1)h.innerHTML='';
  var d=document.createElement('div');d.style.cssText='background:#f0fff4;border:1.5px solid #86efac;border-radius:7px;padding:9px;margin-bottom:6px;font-size:11px';
  d.innerHTML='<b style="color:#166534">✅ PJU → '+g+'</b><br>📍'+la+','+lo+' | '+new Date().toLocaleTimeString('id-ID');
  h.prepend(d);
  showM('PJU berhasil di-tag ke gardu '+g);
  document.getElementById('tp-lat').value='';document.getElementById('tp-lng').value='';document.getElementById('tp-gardu').value='';document.getElementById('tp-info').className='mib';
}
window.sPJU=sPJU;

function sMTR(){
  var la=document.getElementById('tm-lat').value,lo=document.getElementById('tm-lng').value,g=document.getElementById('tm-g').value;
  if(!la||!lo){alert('GPS wajib!');return}if(!g){alert('Gardu wajib!');return}
  var h=document.getElementById('mh');if(h.textContent.indexOf('Belum')>-1)h.innerHTML='';
  var d=document.createElement('div');d.style.cssText='background:#fffbeb;border:1.5px solid #fde68a;border-radius:7px;padding:9px;margin-bottom:6px;font-size:11px';
  d.innerHTML='<b style="color:#92400e">⚡ '+g+' Tersimpan</b><br>📍'+la+','+lo+' | '+new Date().toLocaleTimeString('id-ID');
  h.prepend(d);showM('Meter '+g+' berhasil disimpan');
  document.getElementById('tm-lat').value='';document.getElementById('tm-lng').value='';document.getElementById('tm-g').value='';
}
window.sMTR=sMTR;

// ===== TABLES =====
function initTables(S){
  var pb=document.getElementById('tPB'),c=0;
  METER_DATA.forEach(function(m){m.pjuList.forEach(function(p){if(c>=200)return;c++;
    var s=p.status==='aktif'?'sb-g':'sb-r',l=p.status==='aktif'?'✅ Aktif':'🔴 Mati';
    pb.innerHTML+='<tr><td><code>'+p.id+'</code></td><td>'+m.gardu+'</td><td>'+m.ulp+'</td><td>'+p.daya+'W</td><td>'+p.jenis+'</td><td>'+p.tiang+'</td><td style="font-size:9px">'+p.lat.toFixed(4)+','+p.lng.toFixed(4)+'</td><td><span class="sb '+s+'">'+l+'</span></td></tr>'})});
  document.getElementById('tPI').textContent=c+' dari '+S.totalPJU+' data';
  var mb=document.getElementById('tMB');
  METER_DATA.slice(0,100).forEach(function(m){
    var s=m.status==='anomali'?'sb-p':'sb-g',l=m.status==='anomali'?'⚠️+'+m.anomaliPct+'%':'✅';
    mb.innerHTML+='<tr'+(m.status==='anomali'?' style="background:#fff5f5"':'')+'><td><code>'+m.id+'</code></td><td>'+m.gardu+'</td><td style="font-size:9px">'+m.pln+'</td><td>'+m.ulp+'</td><td><b>'+m.jmlPJU+'</b></td><td>'+(m.totalDaya/1e3).toFixed(1)+'kW</td><td>'+m.kwhPerDay+'</td><td>Rp'+(m.tagihanBln/1e6).toFixed(1)+'Jt</td><td><span class="sb '+s+'">'+l+'</span></td></tr>'});
  document.getElementById('tMI').textContent=Math.min(METER_DATA.length,100)+' dari '+METER_DATA.length+' meter';
}
function fT(v){document.querySelectorAll('#tPB tr').forEach(function(r){r.style.display=r.textContent.toLowerCase().indexOf(v.toLowerCase())>-1?'':'none'})}
window.fT=fT;

// ===== ILEGAL =====
function initIlegal(){
  var a=METER_DATA.filter(function(m){return m.status==='anomali'}).sort(function(a,b){return b.anomaliPct-a.anomaliPct});
  var hi=a.filter(function(m){return m.anomaliPct>=40}),md=a.filter(function(m){return m.anomaliPct<40});
  document.getElementById('iS').innerHTML=
    '<div class="sc"><div class="si2" style="background:rgba(155,89,182,.1);color:#9b59b6">⚠️</div><div><div class="n" style="color:#9b59b6">'+a.length+'</div><div class="l">Total Indikasi</div></div></div>'+
    '<div class="sc"><div class="si2" style="background:rgba(231,76,60,.1);color:#e74c3c">🔴</div><div><div class="n" style="color:#e74c3c">'+hi.length+'</div><div class="l">Risiko Tinggi</div></div></div>'+
    '<div class="sc"><div class="si2" style="background:rgba(243,156,18,.1);color:#f39c12">🟡</div><div><div class="n" style="color:#f39c12">'+md.length+'</div><div class="l">Risiko Sedang</div></div></div>';
  var il=document.getElementById('iL');
  a.slice(0,25).forEach(function(m){
    var c=m.anomaliPct>=40?'#e74c3c':'#f39c12',bg=m.anomaliPct>=40?'#fff5f5':'#fffbeb';
    il.innerHTML+='<div style="border-left:3px solid '+c+';background:'+bg+';padding:12px;border-radius:0 7px 7px 0;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><b style="font-size:12px">'+m.id+' — '+m.gardu+'</b><span style="background:rgba(0,0,0,.05);color:'+c+';padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">+'+m.anomaliPct+'%</span></div><div style="font-size:11px;color:#666">'+m.ulp+' | '+m.jmlPJU+' PJU | '+(m.totalDaya/1e3).toFixed(1)+'kW</div><div style="font-size:11px;margin-top:3px">Est: '+m.kwhEst+' → Aktual: <b style="color:'+c+'">'+m.kwhPerDay+'</b> kWh/hari | Tagihan: Rp'+(m.tagihanBln/1e6).toFixed(1)+'Jt</div></div>'});
}

// ===== UTILS =====
function showM(m){var el=document.getElementById('modal');el.style.display='flex';document.getElementById('modalMsg').textContent=m}
window.showM=showM;
function updateClock(){var d=new Date();var el=document.getElementById('clock');if(el)el.textContent=d.toLocaleString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
</script>
</body>
</html>
